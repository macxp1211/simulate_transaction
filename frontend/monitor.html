<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高精度队列模拟撮合系统 - 监控面板</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>高精度队列模拟撮合系统</h1>
            <nav>
                <a href="/static/index.html">委托终端</a>
                <a href="/static/monitor.html" class="active">监控面板</a>
            </nav>
        </header>

        <div class="monitor-grid">
            <!-- 统计卡片 -->
            <div class="stat-card">
                <h3>委托接收数</h3>
                <div class="stat-value" id="statOrdersReceived">0</div>
                <div class="stat-change up">实时累计</div>
            </div>
            <div class="stat-card">
                <h3>成交笔数</h3>
                <div class="stat-value" id="statOrdersFilled">0</div>
                <div class="stat-change up">实时累计</div>
            </div>
            <div class="stat-card">
                <h3>排队中订单</h3>
                <div class="stat-value" id="statOrdersQueued">0</div>
                <div class="stat-change">当前</div>
            </div>
            <div class="stat-card">
                <h3>引擎数量</h3>
                <div class="stat-value" id="statEngineCount">0</div>
                <div class="stat-change">活跃</div>
            </div>
            <div class="stat-card">
                <h3>成交来自撮合</h3>
                <div class="stat-value" id="statTradesCross">0</div>
                <div class="stat-change">实时累计</div>
            </div>
            <div class="stat-card">
                <h3>成交来自行情</h3>
                <div class="stat-value" id="statTradesFeed">0</div>
                <div class="stat-change">实时累计</div>
            </div>
        </div>

        <div class="chart-container">
            <h3>活跃标的列表</h3>
            <table class="engines-table">
                <thead>
                    <tr><th>标的</th><th>状态</th><th>委托数</th><th>成交数</th><th>排队数</th><th>操作</th></tr>
                </thead>
                <tbody id="enginesTable"></tbody>
            </table>
        </div>

        <div class="chart-container">
            <h3>实时日志</h3>
            <div class="log-list" id="monitorLogList" style="max-height:300px;overflow-y:auto;font-family:monospace;font-size:12px;"></div>
        </div>
    </div>

    <script src="/static/js/monitor.js"></script>
</body>
</html>
